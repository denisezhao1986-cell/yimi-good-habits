<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>薏米的好习惯养成游戏</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --mc-green: #5D8C3E;
  --mc-dark-green: #3B5E28;
  --mc-brown: #8B6914;
  --mc-dark-brown: #6B4F12;
  --mc-stone: #9E9E9E;
  --mc-dark-stone: #7A7A7A;
  --mc-sky: #87CEEB;
  --mc-gold: #FFD700;
  --mc-red: #E74C3C;
  --mc-white: #F5F5F0;
  --mc-black: #2C2C2C;
  --mc-dirt: #8B5E3C;
  --mc-grass-top: #6ABF4B;
  --mc-diamond: #4AEDD9;
  --mc-purple: #B57EDC;
  --pixel-border: 3px solid var(--mc-black);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Press Start 2P', 'Microsoft YaHei', sans-serif;
  background: var(--mc-sky);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

.ground {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: var(--mc-dirt);
  border-top: 8px solid var(--mc-grass-top);
  z-index: 0;
}

.cloud {
  position: fixed;
  background: white;
  border-radius: 0;
  opacity: 0.9;
  z-index: 0;
  animation: float-cloud 30s linear infinite;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: white;
}
.cloud-1 { width: 80px; height: 24px; top: 40px; left: -100px; animation-duration: 35s; }
.cloud-1::before { width: 40px; height: 20px; top: -16px; left: 12px; }
.cloud-1::after { width: 30px; height: 14px; top: -10px; left: 40px; }
.cloud-2 { width: 60px; height: 20px; top: 80px; left: -60px; animation-duration: 45s; animation-delay: 10s; }
.cloud-2::before { width: 30px; height: 16px; top: -12px; left: 8px; }
.cloud-2::after { width: 24px; height: 12px; top: -8px; left: 28px; }
.cloud-3 { width: 70px; height: 22px; top: 30px; left: -80px; animation-duration: 40s; animation-delay: 20s; }
.cloud-3::before { width: 36px; height: 18px; top: -14px; left: 10px; }
.cloud-3::after { width: 28px; height: 12px; top: -8px; left: 36px; }

@keyframes float-cloud {
  from { transform: translateX(-120px); }
  to { transform: translateX(calc(100vw + 120px)); }
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px 12px 80px;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  background: var(--mc-dark-brown);
  border: var(--pixel-border);
  padding: 12px;
  text-align: center;
  margin-bottom: 12px;
  position: relative;
  image-rendering: pixelated;
}
.header::after {
  content: '';
  position: absolute;
  top: 4px; left: 4px; right: 4px; bottom: 4px;
  border: 2px solid var(--mc-brown);
  pointer-events: none;
}
.header h1 {
  color: var(--mc-gold);
  font-size: 15px;
  text-shadow: 2px 2px 0 var(--mc-black);
  line-height: 1.6;
}
.header .subtitle {
  color: var(--mc-white);
  font-size: 7px;
  margin-top: 6px;
  text-shadow: 1px 1px 0 var(--mc-black);
}

/* Hero card (character) */
.hero-card {
  background: var(--mc-dark-brown);
  border: var(--pixel-border);
  padding: 12px;
  margin-bottom: 12px;
  position: relative;
  display: flex;
  align-items: center;
  gap: 14px;
}
.hero-card::after {
  content: '';
  position: absolute;
  top: 4px; left: 4px; right: 4px; bottom: 4px;
  border: 2px solid var(--mc-brown);
  pointer-events: none;
}
.hero-avatar {
  width: 88px;
  height: 110px;
  position: relative;
  flex-shrink: 0;
  z-index: 1;
}
.hero-pixels {
  position: absolute;
  top: 0; left: 0;
  width: 1px; height: 1px;
  animation: hero-bob 1.2s steps(2) infinite;
}
@keyframes hero-bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(3px); }
}
.hero-info {
  flex: 1;
  position: relative;
  z-index: 1;
}
.hero-title {
  color: var(--mc-gold);
  font-size: 11px;
  text-shadow: 1px 1px 0 var(--mc-black);
  margin-bottom: 6px;
  line-height: 1.5;
}
.hero-level {
  color: #6BFF6B;
  font-size: 9px;
  margin-bottom: 8px;
  text-shadow: 1px 1px 0 var(--mc-black);
}
.xp-bar-outer {
  background: var(--mc-black);
  height: 16px;
  border: 2px solid var(--mc-dark-stone);
  position: relative;
}
.xp-bar-inner {
  background: linear-gradient(180deg, #6BFF6B 0%, #3EAF3E 50%, #2D8B2D 100%);
  height: 100%;
  transition: width 0.5s ease;
  position: relative;
}
.xp-bar-inner::after {
  content: '';
  position: absolute;
  top: 2px; left: 0; right: 0; height: 4px;
  background: rgba(255,255,255,0.3);
}
.xp-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 7px;
  text-shadow: 1px 1px 0 var(--mc-black);
  z-index: 2;
  white-space: nowrap;
}
.xp-hint {
  color: var(--mc-stone);
  font-size: 6px;
  margin-top: 6px;
  line-height: 1.6;
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.stat-box {
  flex: 1;
  background: var(--mc-dark-brown);
  border: var(--pixel-border);
  padding: 10px 8px;
  text-align: center;
  position: relative;
}
.stat-box::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px; right: 3px; bottom: 3px;
  border: 1px solid var(--mc-brown);
  pointer-events: none;
}
.stat-label {
  color: var(--mc-stone);
  font-size: 7px;
  margin-bottom: 6px;
}
.stat-value {
  color: var(--mc-gold);
  font-size: 14px;
  text-shadow: 1px 1px 0 var(--mc-black);
}
.stat-value.stars { color: #FFD700; }
.stat-value.streak { color: #FF6B6B; }
.stat-value.level { color: #6BFF6B; }

/* Week calendar */
.week-bar {
  background: var(--mc-dark-brown);
  border: var(--pixel-border);
  padding: 8px;
  margin-bottom: 12px;
  position: relative;
}
.week-bar::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px; right: 3px; bottom: 3px;
  border: 1px solid var(--mc-brown);
  pointer-events: none;
}
.week-label {
  color: var(--mc-stone);
  font-size: 7px;
  text-align: center;
  margin-bottom: 6px;
}
.week-days {
  display: flex;
  gap: 4px;
  justify-content: space-between;
  position: relative;
  z-index: 1;
}
.week-day {
  flex: 1;
  text-align: center;
}
.week-day-name {
  color: var(--mc-stone);
  font-size: 6px;
  margin-bottom: 4px;
  font-family: 'Microsoft YaHei', sans-serif;
}
.week-day-block {
  width: 100%;
  aspect-ratio: 1;
  max-width: 40px;
  margin: 0 auto;
  border: 2px solid var(--mc-black);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  background: #555;
  position: relative;
  color: var(--mc-white);
  text-shadow: 1px 1px 0 var(--mc-black);
}
.week-day-block.all-done {
  background: var(--mc-grass-top);
  border-top: 4px solid #8FE070;
}
.week-day-block.partial {
  background: var(--mc-dirt);
}
.week-day-block.today-pending {
  background: #444;
  border-color: var(--mc-gold);
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 0;
}
.tab {
  flex: 1;
  background: var(--mc-stone);
  border: var(--pixel-border);
  border-bottom: none;
  padding: 10px 2px;
  text-align: center;
  color: var(--mc-black);
  font-size: 8px;
  font-family: 'Press Start 2P', sans-serif;
  cursor: pointer;
  position: relative;
  top: 3px;
}
.tab.active {
  background: var(--mc-dark-brown);
  color: var(--mc-gold);
  top: 0;
  padding-bottom: 13px;
  z-index: 2;
  text-shadow: 1px 1px 0 var(--mc-black);
}

/* Panel */
.panel {
  background: var(--mc-dark-brown);
  border: var(--pixel-border);
  padding: 12px;
  min-height: 300px;
  position: relative;
}
.panel::after {
  content: '';
  position: absolute;
  top: 4px; left: 4px; right: 4px; bottom: 4px;
  border: 2px solid var(--mc-brown);
  pointer-events: none;
}
.panel-content {
  position: relative;
  z-index: 1;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Quest items */
.quest-item {
  background: rgba(0,0,0,0.3);
  border: 2px solid var(--mc-brown);
  padding: 10px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.quest-item:active {
  transform: scale(0.97);
}
.quest-item.completed {
  opacity: 0.5;
  background: rgba(0,100,0,0.3);
}
.quest-checkbox {
  width: 24px;
  height: 24px;
  border: 2px solid var(--mc-stone);
  background: var(--mc-black);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
  color: #6BFF6B;
}
.quest-item.completed .quest-checkbox {
  background: var(--mc-dark-green);
  border-color: var(--mc-green);
}
.quest-info {
  flex: 1;
}
.quest-name {
  color: var(--mc-white);
  font-size: 9px;
  line-height: 1.6;
}
.quest-item.completed .quest-name {
  text-decoration: line-through;
  color: var(--mc-stone);
}
.quest-points {
  color: var(--mc-gold);
  font-size: 8px;
  flex-shrink: 0;
  text-shadow: 1px 1px 0 var(--mc-black);
}

/* Chest banner on quest tab */
.chest-banner {
  background: rgba(255, 215, 0, 0.12);
  border: 2px solid var(--mc-gold);
  padding: 10px;
  margin-bottom: 12px;
  text-align: center;
  cursor: pointer;
  animation: chest-glow 1.5s ease infinite alternate;
}
@keyframes chest-glow {
  from { box-shadow: 0 0 0 rgba(255,215,0,0.0); }
  to { box-shadow: 0 0 16px rgba(255,215,0,0.5); }
}
.chest-banner-text {
  color: var(--mc-gold);
  font-size: 9px;
  line-height: 1.8;
  text-shadow: 1px 1px 0 var(--mc-black);
}

/* Reward items */
.reward-item {
  background: rgba(0,0,0,0.3);
  border: 2px solid var(--mc-brown);
  padding: 10px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.reward-icon {
  width: 32px;
  height: 32px;
  background: var(--mc-black);
  border: 2px solid var(--mc-gold);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.reward-info { flex: 1; }
.reward-name {
  color: var(--mc-white);
  font-size: 9px;
  line-height: 1.6;
}
.reward-cost {
  color: var(--mc-gold);
  font-size: 8px;
  margin-top: 4px;
}
.reward-btn {
  background: var(--mc-green);
  border: 2px solid var(--mc-dark-green);
  color: white;
  font-family: 'Press Start 2P', sans-serif;
  font-size: 7px;
  padding: 6px 10px;
  cursor: pointer;
  text-shadow: 1px 1px 0 var(--mc-black);
}
.reward-btn:disabled {
  background: var(--mc-dark-stone);
  border-color: var(--mc-stone);
  cursor: not-allowed;
  opacity: 0.5;
}
.reward-btn:active:not(:disabled) {
  transform: scale(0.95);
}

/* Collection (ores) */
.collection-title {
  color: var(--mc-gold);
  font-size: 9px;
  margin: 4px 0 10px;
  text-shadow: 1px 1px 0 var(--mc-black);
}
.ore-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.ore-cell {
  background: rgba(0,0,0,0.3);
  border: 2px solid var(--mc-brown);
  padding: 8px 4px;
  text-align: center;
}
.ore-cell.locked {
  opacity: 0.4;
  filter: grayscale(1);
}
.ore-emoji { font-size: 20px; }
.ore-name {
  color: var(--mc-white);
  font-size: 7px;
  margin-top: 4px;
  font-family: 'Microsoft YaHei', sans-serif;
}
.ore-count {
  color: var(--mc-gold);
  font-size: 7px;
  margin-top: 3px;
}
.ore-rarity {
  font-size: 6px;
  margin-top: 2px;
}

/* Achievements */
.ach-item {
  background: rgba(0,0,0,0.3);
  border: 2px solid var(--mc-brown);
  padding: 8px 10px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ach-item.unlocked {
  border-color: var(--mc-gold);
  background: rgba(255,215,0,0.08);
}
.ach-item.locked { opacity: 0.45; }
.ach-icon {
  font-size: 20px;
  width: 30px;
  text-align: center;
  flex-shrink: 0;
}
.ach-item.locked .ach-icon { filter: grayscale(1); }
.ach-info { flex: 1; }
.ach-name {
  color: var(--mc-white);
  font-size: 9px;
  line-height: 1.5;
}
.ach-item.unlocked .ach-name { color: var(--mc-gold); }
.ach-desc {
  color: var(--mc-stone);
  font-size: 7px;
  margin-top: 3px;
  font-family: 'Microsoft YaHei', sans-serif;
}
.ach-check {
  color: #6BFF6B;
  font-size: 12px;
}

/* Settings */
.settings-section {
  margin-bottom: 16px;
}
.settings-title {
  color: var(--mc-gold);
  font-size: 9px;
  margin-bottom: 10px;
  text-shadow: 1px 1px 0 var(--mc-black);
}
.settings-input-row {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.pixel-input {
  flex: 1;
  background: var(--mc-black);
  border: 2px solid var(--mc-stone);
  color: var(--mc-white);
  font-family: 'Microsoft YaHei', sans-serif;
  font-size: 13px;
  padding: 8px;
  outline: none;
  min-width: 0;
}
.pixel-input:focus {
  border-color: var(--mc-gold);
}
.pixel-input-small {
  width: 60px;
  background: var(--mc-black);
  border: 2px solid var(--mc-stone);
  color: var(--mc-gold);
  font-family: 'Press Start 2P', sans-serif;
  font-size: 10px;
  padding: 8px 4px;
  text-align: center;
  outline: none;
}
.pixel-input-small:focus {
  border-color: var(--mc-gold);
}
.pixel-btn {
  background: var(--mc-green);
  border: 2px solid var(--mc-dark-green);
  color: white;
  font-family: 'Press Start 2P', sans-serif;
  font-size: 8px;
  padding: 8px 12px;
  cursor: pointer;
  text-shadow: 1px 1px 0 var(--mc-black);
  white-space: nowrap;
}
.pixel-btn:active { transform: scale(0.95); }
.pixel-btn.danger {
  background: var(--mc-red);
  border-color: #C0392B;
}
.pixel-btn.small {
  font-size: 7px;
  padding: 4px 8px;
}

.editable-item {
  background: rgba(0,0,0,0.3);
  border: 2px solid var(--mc-brown);
  padding: 8px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.editable-item .item-name {
  flex: 1;
  color: var(--mc-white);
  font-size: 9px;
  font-family: 'Microsoft YaHei', sans-serif;
  line-height: 1.5;
}
.editable-item .item-points {
  color: var(--mc-gold);
  font-size: 8px;
  font-family: 'Press Start 2P', sans-serif;
}

/* Celebration overlay */
.celebration {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.celebration.show {
  display: flex;
  animation: fadeIn 0.3s;
}
.celebration-box {
  background: var(--mc-dark-brown);
  border: 4px solid var(--mc-gold);
  padding: 24px;
  text-align: center;
  max-width: 320px;
  margin: 0 16px;
}
.celebration-emoji {
  font-size: 48px;
  margin-bottom: 12px;
  animation: bounce 0.5s ease infinite alternate;
}
.celebration-text {
  color: var(--mc-gold);
  font-size: 12px;
  line-height: 2;
  text-shadow: 2px 2px 0 var(--mc-black);
}
.celebration-sub {
  color: var(--mc-white);
  font-size: 8px;
  margin-top: 8px;
  line-height: 1.8;
}
.celebration-drop {
  margin-top: 10px;
  color: var(--mc-diamond);
  font-size: 8px;
  line-height: 1.8;
  font-family: 'Microsoft YaHei', sans-serif;
}
.celebration-close {
  margin-top: 16px;
  background: var(--mc-green);
  border: 2px solid var(--mc-dark-green);
  color: white;
  font-family: 'Press Start 2P', sans-serif;
  font-size: 10px;
  padding: 10px 24px;
  cursor: pointer;
  text-shadow: 1px 1px 0 var(--mc-black);
}

/* Level up overlay */
.level-up {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 101;
  align-items: center;
  justify-content: center;
}
.level-up.show {
  display: flex;
}
.level-up-box {
  text-align: center;
  animation: levelUpAnim 0.6s ease;
}
.level-up-text {
  color: var(--mc-gold);
  font-size: 20px;
  text-shadow: 3px 3px 0 var(--mc-black);
  animation: pulse 0.5s ease infinite alternate;
}
.level-up-num {
  color: #6BFF6B;
  font-size: 48px;
  margin: 16px 0;
  text-shadow: 4px 4px 0 var(--mc-black);
}
.level-up-sub {
  color: var(--mc-white);
  font-size: 9px;
  line-height: 1.8;
}
.level-up-title {
  color: var(--mc-diamond);
  font-size: 12px;
  margin-top: 12px;
  text-shadow: 2px 2px 0 var(--mc-black);
}

/* Chest overlay */
.chest-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 103;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.chest-overlay.show { display: flex; animation: fadeIn 0.3s; }
.chest-title {
  color: var(--mc-gold);
  font-size: 13px;
  text-shadow: 2px 2px 0 var(--mc-black);
  margin-bottom: 24px;
  line-height: 1.8;
  text-align: center;
}
.chest-box {
  width: 120px;
  height: 100px;
  position: relative;
  cursor: pointer;
  animation: chest-shake 0.8s ease infinite;
}
.chest-box.opened { animation: none; }
@keyframes chest-shake {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-3deg); }
  75% { transform: rotate(3deg); }
}
.chest-lid {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(180deg, #A0742C 0%, #8B6914 100%);
  border: 4px solid var(--mc-black);
  transition: transform 0.4s ease;
  transform-origin: bottom center;
  z-index: 2;
}
.chest-box.opened .chest-lid {
  transform: rotateX(110deg) translateY(-10px);
}
.chest-body {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  background: linear-gradient(180deg, #8B6914 0%, #6B4F12 100%);
  border: 4px solid var(--mc-black);
}
.chest-lock {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 24px;
  background: var(--mc-gold);
  border: 3px solid var(--mc-black);
  z-index: 3;
}
.chest-glow {
  position: absolute;
  top: 10px; left: 10px; right: 10px;
  height: 30px;
  background: radial-gradient(ellipse, rgba(255,255,150,0.9), transparent 70%);
  opacity: 0;
  transition: opacity 0.4s;
  z-index: 1;
}
.chest-box.opened .chest-glow { opacity: 1; }
.chest-hint {
  color: var(--mc-white);
  font-size: 8px;
  margin-top: 24px;
  animation: pulse 0.8s ease infinite alternate;
}
.chest-result {
  display: none;
  text-align: center;
  margin-top: 20px;
}
.chest-result.show { display: block; animation: levelUpAnim 0.5s ease; }
.chest-result-rarity {

<script>
const STORAGE_KEY = 'yimi_adventure';
const XP_PER_LEVEL = 50;
const LEVEL_TITLES = [

const SWORD_COLORS = [

  { id: 'ore50',         name: '矿业大王',   desc: '收集50个矿物',        icon: '\u{1F3D7}️', check: d => totalOres(d) >= 50 },
  { id: 'first_diamond', name: '钻石猎人',   desc: '挖到第一颗钻石',      icon: '\u{1F4A0}', check: d => (d.ores.diamond || 0) >= 1 },
  { id: 'first_chest',   name: '开箱达人',   desc: '打开第一个宝箱',      icon: '\u{1F4E6}', check: d => (d.chestsOpened || 0) >= 1 },
  { id: 'first_redeem',  name: '愿望成真',   desc: '兑换第一个奖励',      icon: '\u{1F381}', check: d => (d.redeemCount || 0) >= 1 }
];

let data = loadData();

// ===== Sound effects (Web Audio API) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playNote(freq, duration, type = 'square', volume = 0.15, delay = 0) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, ctx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + duration);
}

function soundComplete() {
  playNote(523, 0.1, 'square', 0.12, 0);
  playNote(659, 0.1, 'square', 0.12, 0.08);
  playNote(784, 0.15, 'square', 0.12, 0.16);
  playNote(1047, 0.25, 'square', 0.10, 0.26);
}

function soundAllDone() {
  playNote(523, 0.12, 'square', 0.12, 0);
  playNote(659, 0.12, 'square', 0.12, 0.1);
  playNote(784, 0.12, 'square', 0.12, 0.2);
  playNote(1047, 0.12, 'square', 0.12, 0.3);
  playNote(1175, 0.12, 'square', 0.12, 0.4);
  playNote(1319, 0.3, 'square', 0.14, 0.5);
  playNote(1047, 0.15, 'triangle', 0.08, 0.55);
  playNote(1319, 0.4, 'triangle', 0.10, 0.7);
}

function soundLevelUp() {
  const notes = [523, 659, 784, 1047, 784, 1047, 1319, 1568];
  notes.forEach((freq, i) => {
    playNote(freq, 0.15, 'square', 0.12, i * 0.09);
  });
  playNote(1568, 0.5, 'triangle', 0.10, notes.length * 0.09);
}

function soundRedeem() {
  playNote(880, 0.15, 'triangle', 0.12, 0);
  playNote(1109, 0.15, 'triangle', 0.12, 0.12);
  playNote(1319, 0.3, 'triangle', 0.14, 0.24);
}

function soundUndo() {

}

function soundOre() {

  playNote(659, 0.12, 'square', 0.10, 0.24);
  playNote(784, 0.12, 'square', 0.12, 0.36);
  playNote(1047, 0.2, 'triangle', 0.12, 0.48);

function soundAchievement() {
  playNote(659, 0.1, 'triangle', 0.12, 0);
  playNote(880, 0.1, 'triangle', 0.12, 0.1);
  playNote(1319, 0.35, 'triangle', 0.14, 0.2);
}

// ===== Data =====
function defaultData() {
  return {
    version: 2,
    stars: 0,
    xp: 0,
    level: 1,
    streak: 0,
    lastCompleteDate: null,
    lastActiveDate: null,
    quests: [],
    rewards: [],
    todayCompleted: {},
    todayDate: getToday(),
    history: [],
    totalStarsEarned: 0,
    ores: {},
    achievements: [],
    dailyRecord: {},
    chestOpenedDate: null,
    chestsOpened: 0,
    redeemCount: 0
  };
}

function migrate(d) {
  if (d.version >= 2) return d;
  d.version = 2;
  // 从历史记录推算累计星星
  d.totalStarsEarned = (d.history || [])
    .filter(h => h.points > 0)
    .reduce((sum, h) => sum + h.points, 0);
  d.ores = d.ores || {};
  d.achievements = d.achievements || [];
  d.dailyRecord = d.dailyRecord || {};
  d.chestOpenedDate = d.chestOpenedDate || null;
  d.chestsOpened = d.chestsOpened || 0;
  d.redeemCount = d.redeemCount || 0;
  return d;
}

function getToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultData();
    let d = migrate(JSON.parse(raw));
    if (d.todayDate !== getToday()) {
      checkStreak(d);
      d.todayCompleted = {};
      d.todayDate = getToday();
    }
    return d;
  } catch(e) {
    return defaultData();
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function checkStreak(d) {
  if (!d.lastCompleteDate) return;
  const last = new Date(d.lastCompleteDate);
  const today = new Date(getToday());
  const diff = Math.floor((today - last) / 86400000);
  if (diff > 1) {
    d.streak = 0;
  }
}

function isTodayAllDone() {
  if (data.quests.length === 0) return false;
  return data.quests.every(q => data.todayCompleted[q.id]);
}

function totalOres(d) {
  return Object.values(d.ores || {}).reduce((a, b) => a + b, 0);
}

function updateDailyRecord() {
  const done = data.quests.filter(q => data.todayCompleted[q.id]).length;
  data.dailyRecord[getToday()] = {
    done: done,
    total: data.quests.length,
    allDone: data.quests.length > 0 && done === data.quests.length
  };
  // 只保留最近60天
  const keys = Object.keys(data.dailyRecord).sort();
  while (keys.length > 60) {
    delete data.dailyRecord[keys.shift()];
  }
}

// ===== Pixel hero (box-shadow pixel art) =====
function renderHero() {
  const P = 5; // 像素大小
  const swordIdx = Math.min(data.level - 1, SWORD_COLORS.length - 1);
  const SW = SWORD_COLORS[swordIdx];
  const H = '#5A3A22'; // 头发
  const S = '#C68863'; // 皮肤
  const W = '#FFFFFF'; // 眼白
  const B = '#4A3AB5'; // 眼珠
  const M = '#9C6B4A'; // 嘴部阴影
  const T = '#00A8A8'; // 衣服
  const PNT = '#4A3A8C'; // 裤子
  const SH = '#555555'; // 鞋子
  const HD = '#7A5230'; // 剑柄
  const _ = null;

  // 12列 x 20行：左4列是剑，右8列是角色
  const art = [
    [_,_,SW,_, H,H,H,H,H,H,H,H],
    [_,_,SW,_, H,H,H,H,H,H,H,H],
    [_,_,SW,_, H,S,S,S,S,S,S,H],
    [_,_,SW,_, S,S,S,S,S,S,S,S],
    [_,_,SW,_, S,W,B,S,S,B,W,S],
    [_,_,SW,_, S,S,S,S,S,S,S,S],
    [_,_,SW,_, S,S,M,M,M,M,S,S],
    [_,SW,SW,SW, S,S,M,S,S,M,S,S],
    [_,_,HD,_, T,T,T,T,T,T,T,T],
    [_,_,HD,_, T,T,T,T,T,T,T,T],
    [_,S,S,_, T,T,T,T,T,T,T,T],
    [_,_,_,_, T,T,T,T,T,T,T,T],
    [_,_,_,_, T,T,T,T,T,T,T,T],
    [_,_,_,_, T,T,T,T,T,T,T,T],
    [_,_,_,_, PNT,PNT,PNT,PNT,PNT,PNT,PNT,PNT],
    [_,_,_,_, PNT,PNT,PNT,_,_,PNT,PNT,PNT],
    [_,_,_,_, PNT,PNT,PNT,_,_,PNT,PNT,PNT],
    [_,_,_,_, PNT,PNT,PNT,_,_,PNT,PNT,PNT],
    [_,_,_,_, SH,SH,SH,_,_,SH,SH,SH],
    [_,_,_,_, SH,SH,SH,_,_,SH,SH,SH]
  ];

  const shadows = [];
  art.forEach((row, y) => {
    row.forEach((color, x) => {
      if (color) shadows.push(`${x*P}px ${y*P}px 0 0 ${color}`);
    });
  });

  const el = document.getElementById('heroPixels');
  el.style.width = P + 'px';
  el.style.height = P + 'px';
  el.style.boxShadow = shadows.join(',');
}

// ===== Tabs =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ===== Render =====
function render() {
  renderQuests();
  renderRewards();
  renderCollection();
  renderSettings();
  renderStats();
  renderWeek();
  renderHistory();
  renderHero();
  renderChestBanner();
}

function renderStats() {
  document.getElementById('totalStars').textContent = data.stars;
  document.getElementById('streak').textContent = data.streak + '天';
  document.getElementById('oreTotal').textContent = totalOres(data);

  const titleIdx = Math.min(data.level - 1, LEVEL_TITLES.length - 1);
  document.getElementById('heroTitle').textContent = LEVEL_TITLES[titleIdx];
  document.getElementById('heroLevel').textContent = 'Lv.' + data.level;

  const xpForNext = data.level * XP_PER_LEVEL;
  const pct = Math.min(100, (data.xp / xpForNext) * 100);
  document.getElementById('xpBar').style.width = pct + '%';
  document.getElementById('xpText').textContent = data.xp + ' / ' + xpForNext;

  const nextTitleIdx = Math.min(data.level, LEVEL_TITLES.length - 1);
  if (data.level < LEVEL_TITLES.length) {
    document.getElementById('xpHint').textContent = '再攒 ' + (xpForNext - data.xp) + ' 经验升级为「' + LEVEL_TITLES[nextTitleIdx] + '」';
  } else {
    document.getElementById('xpHint').textContent = '已达最高称号！';
  }
}

function renderWeek() {
  const container = document.getElementById('weekDays');
  const dayNames = ['日','一','二','三','四','五','六'];
  let html = '';
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const rec = data.dailyRecord[key];
    const isToday = i === 0;
    let cls = '';
    let mark = '';
    if (rec && rec.allDone) {
      cls = 'all-done';
      mark = '✓';
    } else if (rec && rec.done > 0) {
      cls = 'partial';
      mark = rec.done;
    } else if (isToday) {
      cls = 'today-pending';
      mark = '?';
    }
    const name = isToday ? '今天' : '周' + dayNames[d.getDay()];
    html += `
      <div class="week-day">
        <div class="week-day-name">${name}</div>
        <div class="week-day-block ${cls}">${mark}</div>
      </div>
    `;
  }
  container.innerHTML = html;
}

function renderChestBanner() {
  const banner = document.getElementById('chestBanner');
  if (isTodayAllDone() && data.chestOpenedDate !== getToday()) {
    banner.innerHTML = `
      <div class="chest-banner" onclick="showChestOverlay()">
        <div class="chest-banner-text">&#127873; 你有一个未开启的宝箱！点我开箱 &#127873;</div>
      </div>
    `;
  } else {
    banner.innerHTML = '';
  }
}

function renderQuests() {
  const list = document.getElementById('questList');
  const empty = document.getElementById('questEmpty');
  const notice = document.getElementById('dailyNotice');

  if (data.quests.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    notice.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  const done = data.quests.filter(q => data.todayCompleted[q.id]).length;
  const total = data.quests.length;

  if (isTodayAllDone()) {
    notice.innerHTML = '<div class="daily-notice">&#127942; 今天的任务全部完成啦！太棒了！</div>';
  } else {
    notice.innerHTML = `<div class="daily-notice">&#9876; 今日进度: ${done} / ${total}　还差 ${total - done} 个就能开宝箱！</div>`;
  }

  list.innerHTML = data.quests.map(q => {
    const done = data.todayCompleted[q.id];
    return `
      <div class="quest-item ${done ? 'completed' : ''}" onclick="toggleQuest('${q.id}')">
        <div class="quest-checkbox">${done ? '&#10003;' : ''}</div>
        <div class="quest-info">
          <div class="quest-name">${escHtml(q.name)}</div>
        </div>
        <div class="quest-points">&#11088;${q.points}</div>
      </div>
    `;
  }).join('');
}

function renderRewards() {
  const list = document.getElementById('rewardList');
  const empty = document.getElementById('rewardEmpty');

  if (data.rewards.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = data.rewards.map(r => {
    const canAfford = data.stars >= r.cost;
    return `
      <div class="reward-item">
        <div class="reward-icon">${r.icon || '&#127873;'}</div>
        <div class="reward-info">
          <div class="reward-name">${escHtml(r.name)}</div>
          <div class="reward-cost">&#11088; ${r.cost}</div>
        </div>
        <button class="reward-btn" ${canAfford ? '' : 'disabled'} onclick="redeemReward('${r.id}')">兑换</button>
      </div>
    `;
  }).join('');
}

function renderCollection() {
  // 矿石
  const grid = document.getElementById('oreGrid');
  grid.innerHTML = ORES.map(ore => {
    const count = data.ores[ore.id] || 0;
    const locked = count === 0;
    return `
      <div class="ore-cell ${locked ? 'locked' : ''}">
        <div class="ore-emoji">${locked ? '❓' : ore.emoji}</div>
        <div class="ore-name">${locked ? '???' : ore.name}</div>
        <div class="ore-count">${locked ? '' : 'x' + count}</div>
        <div class="ore-rarity" style="color:${ore.color}">${ore.rarity}</div>
      </div>
    `;
  }).join('');

  // 成就
  const achList = document.getElementById('achList');
  const unlockedCount = data.achievements.length;
  document.getElementById('achProgress').textContent = `(${unlockedCount}/${ACHIEVEMENTS.length})`;
  achList.innerHTML = ACHIEVEMENTS.map(a => {
    const unlocked = data.achievements.includes(a.id);
    return `
      <div class="ach-item ${unlocked ? 'unlocked' : 'locked'}">
        <div class="ach-icon">${a.icon}</div>
        <div class="ach-info">
          <div class="ach-name">${a.name}</div>
          <div class="ach-desc">${a.desc}</div>
        </div>
        ${unlocked ? '<div class="ach-check">&#10003;</div>' : ''}
      </div>
    `;
  }).join('');
}

function renderSettings() {
  const qList = document.getElementById('questSettingsList');
  qList.innerHTML = data.quests.map(q => `
    <div class="editable-item">
      <span class="item-name">${escHtml(q.name)}</span>
      <span class="item-points">&#11088;${q.points}</span>
      <button class="pixel-btn danger small" onclick="removeQuest('${q.id}')">&#10005;</button>
    </div>
  `).join('');

  const rList = document.getElementById('rewardSettingsList');
  rList.innerHTML = data.rewards.map(r => `
    <div class="editable-item">
      <span class="item-name">${escHtml(r.name)}</span>
      <span class="item-points">&#11088;${r.cost}</span>
      <button class="pixel-btn danger small" onclick="removeReward('${r.id}')">&#10005;</button>
    </div>
  `).join('');
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  const recent = data.history.slice(-20).reverse();

  if (recent.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = recent.map(h => `
    <div class="history-item">
      <span class="history-date">${h.date}</span>
      <span class="history-detail">${escHtml(h.text)}</span>
      <span class="history-points" style="color:${h.points > 0 ? 'var(--mc-gold)' : 'var(--mc-red)'}">
        ${h.points > 0 ? '+' : ''}${h.points}&#11088;
      </span>
    </div>
  `).join('');
}

// ===== Ore drop =====
function rollOre() {
  const roll = Math.random();
  let acc = 0;
  for (const ore of ORES) {
    acc += ore.rate;
    if (roll < acc) return ore;
  }
  return ORES[0];
}

// ===== Actions =====
function toggleQuest(id) {
  const quest = data.quests.find(q => q.id === id);
  if (!quest) return;

  if (data.todayCompleted[id]) {
    delete data.todayCompleted[id];
    data.stars -= quest.points;
    data.xp -= quest.points;
    if (data.xp < 0) data.xp = 0;
    if (data.stars < 0) data.stars = 0;
    data.history.push({
      date: getToday(),
      text: '撤销: ' + quest.name,
      points: -quest.points
    });
    soundUndo();
    updateDailyRecord();
  } else {
    data.todayCompleted[id] = true;
    data.stars += quest.points;
    data.xp += quest.points;
    data.totalStarsEarned += quest.points;
    data.lastActiveDate = getToday();
    data.history.push({
      date: getToday(),
      text: quest.name,
      points: quest.points
    });

    // 挖矿掉落
    const ore = rollOre();
    data.ores[ore.id] = (data.ores[ore.id] || 0) + 1;

    updateDailyRecord();
    spawnParticles();
    soundComplete();
    setTimeout(soundOre, 500);
    showCelebration(
      '&#11088;',
      `+${quest.points} &#11088;`,
      quest.name + ' 完成！',
      `&#9935; 还挖到了 ${ore.emoji} ${ore.name}（${ore.rarity}）！`
    );

    checkLevelUp();

    if (isTodayAllDone()) {
      const wasAllDone = data.lastCompleteDate === getToday();
      if (!wasAllDone) {
        data.lastCompleteDate = getToday();
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;

        if (data.lastCompleteDate && data.history.length > 0) {
          const prevComplete = data.history.filter(h => h.date === yStr && h.points > 0).length > 0;
          if (prevComplete || data.streak > 0) {
            data.streak++;
          } else {
            data.streak = 1;
          }
        } else {
          data.streak = 1;
        }

        setTimeout(() => {
          soundAllDone();
          closeCelebration();
          showChestOverlay();
        }, 1500);
      }
    }
  }

  saveData();
  render();
  checkAchievements();
}

function checkLevelUp() {
  const xpNeeded = data.level * XP_PER_LEVEL;
  if (data.xp >= xpNeeded) {
    data.xp -= xpNeeded;
    data.level++;
    saveData();

    setTimeout(() => {
      showLevelUp(data.level);
    }, 800);
  }
}

function showLevelUp(level) {
  const el = document.getElementById('levelUp');
  document.getElementById('levelUpNum').textContent = 'Lv.' + level;
  const titleIdx = Math.min(level - 1, LEVEL_TITLES.length - 1);
  document.getElementById('levelUpTitle').textContent = '✨ ' + LEVEL_TITLES[titleIdx] + ' ✨';
  el.classList.add('show');
  spawnParticles(30);
  soundLevelUp();

  setTimeout(() => {
    el.classList.remove('show');
    render();
    checkAchievements();
  }, 2800);
}

// ===== Chest =====
function showChestOverlay() {
  if (data.chestOpenedDate === getToday()) return;
  const overlay = document.getElementById('chestOverlay');
  document.getElementById('chestBox').classList.remove('opened');
  document.getElementById('chestResult').classList.remove('show');
  document.getElementById('chestHint').style.display = 'block';
  overlay.classList.add('show');
}

function openChest() {
  if (data.chestOpenedDate === getToday()) return;
  const box = document.getElementById('chestBox');
  if (box.classList.contains('opened')) return;

  box.classList.add('opened');
  document.getElementById('chestHint').style.display = 'none';
  soundChestOpen();
  spawnParticles(25);

  // 随机奖励
  const roll = Math.random();
  let rarity, rarityColor, prize;
  if (roll < 0.01) {
    rarity = '\u{1F451} 传说宝箱！'; rarityColor = 'var(--mc-purple)'; prize = 50;
  } else if (roll < 0.10) {
    rarity = '\u{1F48E} 史诗宝箱！'; rarityColor = 'var(--mc-diamond)'; prize = 20;
  } else if (roll < 0.40) {
    rarity = '\u{1F31F} 稀有宝箱！'; rarityColor = 'var(--mc-gold)'; prize = 10;
  } else {
    rarity = '\u{1F4E6} 普通宝箱'; rarityColor = 'var(--mc-white)'; prize = 5;
  }

  data.stars += prize;
  data.totalStarsEarned += prize;
  data.chestOpenedDate = getToday();
  data.chestsOpened = (data.chestsOpened || 0) + 1;
  data.history.push({
    date: getToday(),
    text: '宝箱奖励',
    points: prize
  });
  saveData();

  setTimeout(() => {
    const rarityEl = document.getElementById('chestRarity');
    rarityEl.textContent = rarity;
    rarityEl.style.color = rarityColor;
    document.getElementById('chestPrize').innerHTML = `+${prize} &#11088;`;
    document.getElementById('chestResult').classList.add('show');
  }, 500);
}

function closeChest() {
  document.getElementById('chestOverlay').classList.remove('show');
  render();
  checkAchievements();
}

// ===== Achievements =====
let achQueue = [];
let achShowing = false;

function checkAchievements() {
  ACHIEVEMENTS.forEach(a => {
    if (!data.achievements.includes(a.id) && a.check(data)) {
      data.achievements.push(a.id);
      achQueue.push(a);
    }
  });
  saveData();
  showNextAchToast();
}

function showNextAchToast() {
  if (achShowing || achQueue.length === 0) return;
  achShowing = true;
  const a = achQueue.shift();
  const toast = document.getElementById('achToast');
  document.getElementById('achToastIcon').textContent = a.icon;
  document.getElementById('achToastName').textContent = a.name + ' — ' + a.desc;
  toast.classList.add('show');
  soundAchievement();

  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => {
      achShowing = false;
      renderCollection();
      showNextAchToast();
    }, 500);
  }, 2500);
}

// ===== Rewards =====
function redeemReward(id) {
  const reward = data.rewards.find(r => r.id === id);
  if (!reward || data.stars < reward.cost) return;

  if (!confirm(`确定要用 ${reward.cost} 颗星星兑换「${reward.name}」吗？`)) return;

  data.stars -= reward.cost;
  data.redeemCount = (data.redeemCount || 0) + 1;
  data.history.push({
    date: getToday(),
    text: '兑换: ' + reward.name,
    points: -reward.cost
  });

  soundRedeem();
  showCelebration(
    '&#127873;',
    '奖励已兑换！',
    reward.name,
    ''
  );

  saveData();
  render();
  checkAchievements();
}

function addQuest() {
  const nameInput = document.getElementById('newQuestName');
  const pointsInput = document.getElementById('newQuestPoints');
  const name = nameInput.value.trim();
  const points = parseInt(pointsInput.value) || 5;

  if (!name) return;

  data.quests.push({
    id: 'q_' + Date.now(),
    name: name,
    points: Math.max(1, Math.min(99, points))
  });

  nameInput.value = '';
  pointsInput.value = '5';
  saveData();
  render();
}

function removeQuest(id) {
  if (!confirm('确定删除这个任务吗？')) return;
  data.quests = data.quests.filter(q => q.id !== id);
  delete data.todayCompleted[id];
  saveData();
  render();
}

function addReward() {
  const nameInput = document.getElementById('newRewardName');
  const costInput = document.getElementById('newRewardCost');
  const name = nameInput.value.trim();
  const cost = parseInt(costInput.value) || 30;

  if (!name) return;

  const icons = ['&#127873;', '&#127846;', '&#127836;', '&#127918;', '&#128187;', '&#127908;', '&#9917;', '&#127947;'];
  const icon = icons[data.rewards.length % icons.length];

  data.rewards.push({
    id: 'r_' + Date.now(),
    name: name,
    cost: Math.max(1, Math.min(999, cost)),
    icon: icon
  });

  nameInput.value = '';
  costInput.value = '30';
  saveData();
  render();
}

function removeReward(id) {
  if (!confirm('确定删除这个奖励吗？')) return;
  data.rewards = data.rewards.filter(r => r.id !== id);
  saveData();
  render();
}

function resetAll() {
  if (!confirm('确定要重置所有数据吗？星星、等级、连续天数都会清零！')) return;
  if (!confirm('真的确定吗？这个操作不可撤销！')) return;
  localStorage.removeItem(STORAGE_KEY);
  data = defaultData();
  saveData();
  render();
}

// ===== Celebration =====
function showCelebration(emoji, text, sub, drop) {
  const el = document.getElementById('celebration');
  document.getElementById('celebEmoji').innerHTML = emoji;
  document.getElementById('celebText').innerHTML = text;
  document.getElementById('celebSub').innerHTML = sub;
  document.getElementById('celebDrop').innerHTML = drop || '';
  el.classList.add('show');
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
}

// ===== Particles =====
function spawnParticles(count = 15) {
  const emojis = ['&#11088;', '&#10024;', '&#127775;', '&#128171;', '&#9889;'];
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.top = (Math.random() * 40 + 10) + 'vh';
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    p.style.animationDuration = (1 + Math.random()) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2000);
  }
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Enter key support for inputs
document.getElementById('newQuestName').addEventListener('keydown', e => {
  if (e.key === 'Enter') addQuest();
});
document.getElementById('newRewardName').addEventListener('keydown', e => {
  if (e.key === 'Enter') addReward();
});

// Init
render();
checkAchievements();
</script>
